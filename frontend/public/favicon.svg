<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#04070f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>
  <!-- Globe outline -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="url(#globe)" stroke-width="1.8" opacity="0.9"/>
  <!-- Equator -->
  <ellipse cx="32" cy="32" rx="20" ry="7" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.6"/>
  <!-- Meridian 1 -->
  <ellipse cx="32" cy="32" rx="10" ry="20" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>
  <!-- Vertical center line -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="#00d4ff" stroke-width="1.2" opacity="0.4"/>
  <!-- Horizontal center line -->
  <line x1="12" y1="32" x2="52" y2="32" stroke="#00d4ff" stroke-width="1.2" opacity="0.4"/>
  <!-- Radar ring 1 -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.25" stroke-dasharray="3 4"/>
  <!-- Target dot center -->
  <circle cx="32" cy="32" r="2.5" fill="#00d4ff" opacity="0.95"/>
  <!-- Crosshair ticks -->
  <line x1="32" y1="8" x2="32" y2="14" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="56" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="8" y1="32" x2="14" y2="32" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="56" y2="32" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
</svg>
